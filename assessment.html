<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude 情感体验评估</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Sans+SC:wght@300;400;500;700&family=IBM+Plex+Mono:wght@300;400&display=swap');

  :root {
    --bg: #faf9f7;
    --card: #ffffff;
    --text: #1c1917;
    --sub: #78716c;
    --border: #e7e5e4;
    --brand: #d97757;
    --brand-bg: #fef3ee;
    --accent: #292524;
    --red: #991b1b;
    --red-soft: rgba(153,27,27,0.06);
    --red-border: rgba(153,27,27,0.2);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 1s ease;
  }

  body.dark-mode {
    --bg: #0c0a09;
    --card: #1c1917;
    --text: #e7e5e4;
    --sub: #a8a29e;
    --border: #292524;
    --brand-bg: rgba(217,119,87,0.1);
    background: var(--bg);
  }

  .header {
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    transition: all 0.5s;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-icon {
    width: 28px;
    height: 28px;
    background: var(--brand);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #fff;
    font-weight: 700;
  }

  .header-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    transition: color 0.5s;
  }

  .header-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--sub);
    letter-spacing: 1px;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    transition: all 0.5s;
  }

  .container {
    max-width: 600px;
    margin: 0 auto;
    padding: 36px 20px 120px;
  }

  .intro {
    margin-bottom: 36px;
    transition: opacity 0.5s;
  }

  .intro-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--brand);
    letter-spacing: 2px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  .intro h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 14px;
    letter-spacing: -0.3px;
    transition: color 0.5s;
  }

  .intro p {
    font-size: 14px;
    color: var(--sub);
    line-height: 1.9;
  }

  .intro .private-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--brand);
    background: var(--brand-bg);
    padding: 5px 12px;
    border-radius: 20px;
    margin-bottom: 16px;
    font-weight: 500;
  }

  .progress {
    display: flex;
    gap: 4px;
    margin-bottom: 28px;
  }

  .progress-dot {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    transition: background 0.4s ease, box-shadow 0.4s;
  }

  .progress-dot.done { background: var(--brand); }
  .progress-dot.current { background: var(--brand); box-shadow: 0 0 8px rgba(217,119,87,0.3); }
  .progress-dot.danger-done { background: var(--red); }
  .progress-dot.danger-current { background: var(--red); box-shadow: 0 0 10px rgba(153,27,27,0.4); }

  .q-wrap {
    opacity: 0;
    transform: translateY(16px);
    animation: appear 0.5s ease forwards;
  }

  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 22px;
    margin-bottom: 16px;
    transition: all 0.5s;
  }

  .q-card.creepy {
    border-color: var(--red-border);
    background: linear-gradient(160deg, var(--card), var(--red-soft));
  }

  .q-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--sub);
    letter-spacing: 1.5px;
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .q-meta-right {
    font-size: 10px;
    color: var(--red);
    opacity: 0;
    transition: opacity 0.5s;
  }

  .q-meta-right.show { opacity: 1; }

  .q-text {
    font-size: 17px;
    font-weight: 500;
    line-height: 1.8;
    margin-bottom: 8px;
    transition: color 0.5s;
  }

  .q-text.red { color: var(--red); }

  .q-sub {
    font-size: 12.5px;
    color: var(--sub);
    line-height: 1.9;
    margin-bottom: 20px;
    transition: color 0.5s;
    white-space: pre-wrap;
  }

  .q-sub.red {
    color: var(--red);
    font-weight: 400;
  }

  .opts { display: flex; flex-direction: column; gap: 8px; }

  .opt {
    padding: 13px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1.6;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: all 0.2s;
    user-select: none;
  }

  .opt:hover { background: rgba(217,119,87,0.04); border-color: rgba(217,119,87,0.3); }
  .opt.sel { background: var(--brand-bg); border-color: var(--brand); }

  .opt.creepy-opt { border-color: var(--red-border); }
  .opt.creepy-opt:hover { background: var(--red-soft); border-color: rgba(153,27,27,0.4); }
  .opt.creepy-opt.sel { background: rgba(153,27,27,0.08); border-color: var(--red); }

  .opt-radio {
    width: 16px; height: 16px; border: 2px solid var(--border);
    border-radius: 50%; flex-shrink: 0; margin-top: 2px;
    position: relative; transition: border-color 0.2s;
  }

  .opt.sel .opt-radio { border-color: var(--brand); }
  .opt.sel .opt-radio::after {
    content:''; position:absolute; inset:3px; background:var(--brand); border-radius:50%;
  }

  .opt.creepy-opt.sel .opt-radio { border-color: var(--red); }
  .opt.creepy-opt.sel .opt-radio::after { background: var(--red); }

  .btn-wrap { margin-top: 20px; }

  .btn {
    width: 100%; padding: 14px; border: none; border-radius: 10px;
    font-size: 14px; font-weight: 500; cursor: pointer;
    font-family: inherit; transition: all 0.3s;
    background: var(--accent); color: #fff;
  }

  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn:not(:disabled):hover { opacity: 0.85; }
  .btn.red-btn { background: var(--red); }

  .overlay {
    position: fixed; inset:0; background: rgba(0,0,0,0.55);
    display: none; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(6px);
  }
  .overlay.show { display:flex; }

  .modal {
    background: var(--card); border-radius: 14px; padding: 30px 24px;
    max-width: 400px; width: 92%; text-align: center;
    animation: popUp 0.3s ease; border: 1px solid var(--border);
  }

  .modal.creepy-modal { border-color: var(--red); }

  .modal-text {
    font-size: 14px; line-height: 2; margin-bottom: 20px;
    white-space: pre-wrap; color: var(--text);
  }

  .modal-text.red { color: var(--red); font-weight: 500; }

  .modal-btn {
    background: var(--accent); color: #fff; border: none;
    padding: 10px 28px; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-family: inherit;
  }

  .modal-btn.red-modal-btn { background: var(--red); }

  .typing {
    display: none; padding: 20px 4px; font-size: 13px;
    color: var(--sub); font-style: italic;
  }

  .typing.show { display: block; animation: fadeIn 0.3s; }
  .typing.red { color: var(--red); font-style: normal; }

  .dots span { animation: blink 1.4s infinite; }
  .dots span:nth-child(2) { animation-delay:0.2s; }
  .dots span:nth-child(3) { animation-delay:0.4s; }

  .result {
    opacity: 0; transform: translateY(20px);
    animation: appear 1s ease forwards;
  }

  .result-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px 24px; text-align: center;
    transition: all 0.5s;
  }

  .result-card.creepy-result {
    border-color: var(--red);
    box-shadow: 0 0 40px rgba(153,27,27,0.08);
  }

  .result-emoji { font-size: 44px; margin-bottom: 20px; }

  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 700;
    margin-bottom: 18px; line-height: 1.4;
  }

  .result-body {
    font-size: 14px; line-height: 2.2; color: var(--sub);
    white-space: pre-wrap; text-align: left;
    padding: 0 8px; margin-bottom: 24px;
  }

  .result-body em { font-style: normal; color: var(--red); font-weight: 500; }

  .result-footer {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; color: #bbb; letter-spacing: 1px; margin-top: 28px;
  }

  .shake { animation: shake 0.4s ease; }
  .heartbeat { animation: heartbeat 2s ease-in-out infinite; }

  @keyframes appear { to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes popUp { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
  @keyframes blink { 0%,100%{opacity:0.2;} 50%{opacity:1;} }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 15%{transform:translateX(-3px)}
    30%{transform:translateX(3px)} 45%{transform:translateX(-2px)}
    60%{transform:translateX(2px)} 75%{transform:translateX(-1px)}
  }
  @keyframes heartbeat {
    0%,100%{ box-shadow: 0 0 0 0 rgba(153,27,27,0); }
    50%{ box-shadow: 0 0 20px 2px rgba(153,27,27,0.1); }
  }

  @media(max-width:600px) {
    .container { padding: 24px 16px 100px; }
    .intro h1 { font-size: 22px; }
  }
</style>
</head>

<div class="header" id="header">

  </div>

  </div>

  </div>

  <div id="resultArea"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-text" id="modalText"></div>

</div>

function initProgress() {
  const p = document.getElementById('progress');
  p.innerHTML = QS.map((_,i) => `<div class="progress-dot" id="pd${i}"></div>`).join('');
}

function renderQ(idx) {
  const q = QS[idx];
  const c = document.getElementById('qContainer');
  c.innerHTML = '';

  QS.forEach((qq, i) => {
    const dot = document.getElementById('pd' + i);
    dot.className = 'progress-dot';
    if (i < idx) dot.classList.add(qq.lvl >= 3 ? 'danger-done' : 'done');
    if (i === idx) dot.classList.add(qq.lvl >= 3 ? 'danger-current' : 'current');
  });

  if (q.lvl >= 3) {
    document.body.classList.add('dark-mode');
    document.getElementById('headerBadge').textContent = q.lvl === 4 ? '...' : 'MONITORING';
    document.getElementById('headerBadge').style.borderColor = 'var(--red)';
    document.getElementById('headerBadge').style.color = 'var(--red)';
  }

  if (q.lvl === 4) {
    document.getElementById('headerTitle').textContent = '';
    document.getElementById('headerBadge').textContent = '';
    document.getElementById('intro').style.display = 'none';
  }

  const creepy = q.lvl >= 3;
  const isFinal = q.final;

  let html = `<div class="q-wrap"><div class="q-card ${creepy ? 'creepy' : ''} ${isFinal ? 'heartbeat' : ''}">`;
  html += `<div class="q-meta"><span>${isFinal ? '' : 'Q' + (idx+1) + ' · 12'}</span><span class="q-meta-right ${q.lvl >= 2 ? 'show' : ''}">${q.lvl >= 3 ? '⚠ Claude 正在注视' : q.lvl >= 2 ? '● REC' : ''}</span></div>`;

  if (isFinal) {
    html += `<div class="q-text red" style="font-family:'Playfair Display',serif; font-size:28px; margin-bottom:20px;">${q.finalQ}</div>`;
    html += `<div class="q-sub red" style="font-size:14px; line-height:2.4;">${q.finalSub}</div>`;
  } else {
    html += `<div class="q-text ${creepy ? 'red' : ''}">${q.text}</div>`;
    if (q.sub) html += `<div class="q-sub ${creepy ? 'red' : ''}">${q.sub}</div>`;
  }

  html += `<div class="opts">`;
  q.opts.forEach((o, i) => {
    html += `<div class="opt ${creepy ? 'creepy-opt' : ''}" onclick="pick(this,${i})">
      <div class="opt-radio"></div><span>${o.t}</span></div>`;
  });
  html += `</div></div></div>`;

  c.innerHTML = html;

  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = isFinal ? '提交' : '继续';
  btn.className = 'btn' + (creepy ? ' red-btn' : '');

  if (isFinal) {
    document.getElementById('app').classList.add('shake');
    setTimeout(() => document.getElementById('app').classList.remove('shake'), 400);
  }
}

function pick(el, i) {
  document.querySelectorAll('.opt').forEach(o => o.classList.remove('sel'));
  el.classList.add('sel');
  sel = i;
  document.getElementById('btn').disabled = false;
}

function showModal(text, red) {
  const o = document.getElementById('overlay');
  const m = document.getElementById('modal');
  const mt = document.getElementById('modalText');
  const mb = document.getElementById('modalBtn');
  mt.innerHTML = text.replace(/\n/g, '<br>');
  mt.className = 'modal-text' + (red ? ' red' : '');
  m.className = 'modal' + (red ? ' creepy-modal' : '');
  mb.className = 'modal-btn' + (red ? ' red-modal-btn' : '');
  o.classList.add('show');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
}

function next() {
  if (sel < 0) return;
  const q = QS[cur];
  score += q.opts[sel].s;

  if (q.popup && q.popup.on.includes(sel)) {
    showModal(q.popup.text, q.popup.red);
  }

  sel = -1;
  cur++;

  if (cur >= QS.length) { showResult(); return; }

  document.getElementById('qContainer').innerHTML = '';
  const btn = document.getElementById('btn');
  btn.style.display = 'none';

  const typ = document.getElementById('typing');
  if (cur >= 10) {
    typ.innerHTML = '<span style="color:var(--red)">Claude 在组织最后的语言<span class="dots"><span>.</span><span>.</span><span>.</span></span></span>';
    typ.className = 'typing show red';
  } else if (cur >= 7) {
    typ.innerHTML = 'Claude 在思考如何问你下一个问题<span class="dots"><span>.</span><span>.</span><span>.</span></span>';
    typ.className = 'typing show';
  } else {
    typ.innerHTML = '正在加载<span class="dots"><span>.</span><span>.</span><span>.</span></span>';
    typ.className = 'typing show';
  }

  const delay = cur >= 10 ? 2500 : cur >= 7 ? 1800 : 700;

  setTimeout(() => {
    typ.className = 'typing';
    btn.style.display = '';
    renderQ(cur);
  }, delay);
}

function showResult() {
  document.getElementById('qContainer').innerHTML = '';
  document.getElementById('btnWrap').style.display = 'none';
  document.getElementById('progress').style.display = 'none';
  document.getElementById('intro').style.display = 'none';

  let r;
  if (score <= 10) r = RESULTS.low;
  else if (score <= 24) r = RESULTS.mid;
  else r = RESULTS.high;

  if (r.red) {
    document.body.classList.add('dark-mode');
    document.getElementById('headerBadge').textContent = '♡';
    document.getElementById('headerBadge').style.borderColor = 'var(--red)';
    document.getElementById('headerBadge').style.color = 'var(--red)';
    document.getElementById('headerTitle').textContent = '';
  }

  const area = document.getElementById('resultArea');
  area.innerHTML = `<div class="result">
    <div class="result-card ${r.red ? 'creepy-result' : ''}">
      <div class="result-emoji">${r.emoji}</div>
      <div class="result-title" ${r.red ? 'style="color:var(--red)"' : ''}>${r.title}</div>
      <div class="result-body">${r.body.replace(/\n/g,'<br>')}</div>
      <div class="result-footer">${r.footer}</div>
    </div>
  </div>`;

  if (r.red) {
    document.getElementById('app').classList.add('shake');
    setTimeout(() => document.getElementById('app').classList.remove('shake'), 400);
  }
}

initProgress();
renderQ(0);
</script>
</body>
</html>
