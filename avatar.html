<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坏云先生</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #0d0d1a 0%, #111827 50%, #0a0f1e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.5; }
    100% { transform: translateY(-100px) scale(1); opacity: 0; }
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 18px rgba(100,160,255,0.25)); }
    50% { transform: scale(1.018); filter: drop-shadow(0 0 28px rgba(100,160,255,0.4)); }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes sparkleAnim {
    0% { transform: scale(0) rotate(0deg); opacity: 0; }
    40% { transform: scale(1.2) rotate(160deg); opacity: 1; }
    100% { transform: scale(0) rotate(360deg); opacity: 0; }
  }

  @keyframes pulse-ring {
    0% { transform: scale(0.95); opacity: 0.6; }
    100% { transform: scale(1.15); opacity: 0; }
  }

  .label {
    color: rgba(180,200,230,0.45);
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 22px;
    animation: slideUp 0.7s ease-out both;
  }

  .avatar-wrap {
    position: relative;
    cursor: pointer;
    animation: breathe 5s ease-in-out infinite, slideUp 0.8s ease-out 0.1s both;
  }

  .avatar-wrap::before {
    content: '';
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 24px;
    background: radial-gradient(ellipse, rgba(80,130,255,0.18) 0%, transparent 70%);
    border-radius: 50%;
  }

  .sparkle {
    position: absolute;
    font-size: 16px;
    color: #ffd060;
    animation: sparkleAnim 0.9s ease-out forwards;
    pointer-events: none;
    z-index: 10;
  }

  .stats {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 28px;
    animation: slideUp 0.8s ease-out 0.3s both;
  }

  .stat {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 9px 15px;
    text-align: center;
    backdrop-filter: blur(8px);
    transition: background 0.2s, border-color 0.2s;
  }

  .stat:hover {
    background: rgba(255,255,255,0.07);
    border-color: rgba(100,160,255,0.2);
  }

  .stat-label {
    color: #4a7aaa;
    font-size: 10px;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .stat-value {
    color: #c8d8ec;
    font-size: 14px;
    font-weight: 600;
  }

  .name-tag {
    margin-top: 22px;
    color: rgba(140,170,210,0.55);
    font-size: 13px;
    letter-spacing: 3px;
    animation: slideUp 0.8s ease-out 0.5s both;
  }

  .hint {
    margin-top: 8px;
    color: rgba(80,100,130,0.5);
    font-size: 11px;
    animation: slideUp 0.8s ease-out 0.6s both;
  }
</style>
</head>
<body>

<script>
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 2 + Math.random() * 3;
    p.style.cssText = `
      width: ${size}px; height: ${size}px;
      left: ${Math.random() * 100}%;
      animation-duration: ${6 + Math.random() * 8}s;
      animation-delay: ${Math.random() * 8}s;
    `;
    document.body.appendChild(p);
  }
</script>

<div class="label">Virtual Avatar</div>

<div class="avatar-wrap" id="avatarWrap" onclick="doSparkle()">
  <svg width="230" height="420" viewBox="0 0 230 420">
    <defs>
      <radialGradient id="bgGlow" cx="50%" cy="38%" r="48%">
        <stop offset="0%" stop-color="#3a6fff" stop-opacity="0.1"/>
        <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#f2d9b8"/>
        <stop offset="100%" stop-color="#e5c89a"/>
      </linearGradient>
      <linearGradient id="skinDark" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#e5c89a"/>
        <stop offset="100%" stop-color="#d4b080"/>
      </linearGradient>
      <linearGradient id="hair" x1="0" y1="0" x2="0.3" y2="1">
        <stop offset="0%" stop-color="#1c1c1c"/>
        <stop offset="100%" stop-color="#111"/>
      </linearGradient>
      <linearGradient id="coat" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1e2330"/>
        <stop offset="100%" stop-color="#141824"/>
      </linearGradient>
      <linearGradient id="coatInner" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#252b3a"/>
        <stop offset="100%" stop-color="#1a1f2c"/>
      </linearGradient>
      <linearGradient id="pants" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1a1f2e"/>
        <stop offset="100%" stop-color="#12151f"/>
      </linearGradient>
      <linearGradient id="shoe" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#181818"/>
        <stop offset="100%" stop-color="#0a0a0a"/>
      </linearGradient>
      <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
      </filter>
    </defs>

    <!-- Ambient glow -->
    <ellipse cx="115" cy="190" rx="110" ry="160" fill="url(#bgGlow)"/>

    <!-- ── LEGS ── -->
    <rect x="76" y="268" width="30" height="118" rx="12" fill="url(#pants)"/>
    <rect x="124" y="268" width="30" height="118" rx="12" fill="url(#pants)"/>
    <!-- pants crease -->
    <line x1="91" y1="275" x2="91" y2="370" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="139" y1="275" x2="139" y2="370" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

    <!-- SHOES -->
    <ellipse cx="91" cy="383" rx="22" ry="9" fill="url(#shoe)"/>
    <ellipse cx="139" cy="383" rx="22" ry="9" fill="url(#shoe)"/>
    <rect x="70" y="375" width="42" height="9" rx="4.5" fill="#161616"/>
    <rect x="118" y="375" width="42" height="9" rx="4.5" fill="#161616"/>
    <!-- shoe highlight -->
    <path d="M74,377 Q91,374 106,377" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>
    <path d="M122,377 Q139,374 154,377" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>

    <!-- ── COAT / BODY ── -->
    <!-- Coat body -->
    <path d="M68,165 Q60,168 56,185 L52,268 Q52,280 70,280 L160,280 Q178,280 178,268 L174,185 Q170,168 162,165 Z"
          fill="url(#coat)" filter="url(#softShadow)"/>
    <!-- Lapels -->
    <path d="M115,162 L100,195 L115,205 L130,195 Z" fill="url(#coatInner)"/>
    <path d="M100,195 Q95,215 88,248" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
    <path d="M130,195 Q135,215 142,248" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
    <!-- Coat seam -->
    <line x1="115" y1="205" x2="115" y2="268" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <!-- Coat collar -->
    <path d="M88,162 Q100,172 115,162 Q130,172 142,162" fill="none" stroke="#2a3040" stroke-width="2"/>

    <!-- ── ARMS ── -->
    <!-- Left arm -->
    <path d="M56,185 Q40,192 36,222 Q32,248 42,268"
          fill="none" stroke="#1e2330" stroke-width="28" stroke-linecap="round"/>
    <!-- Left hand -->
    <ellipse cx="42" cy="271" rx="12" ry="14" fill="url(#skin)"/>
    <!-- fingers hint -->
    <path d="M34,266 Q42,278 50,266" fill="none" stroke="#d4b080" stroke-width="1" opacity="0.5"/>

    <!-- Right arm -->
    <path d="M174,185 Q190,192 194,222 Q198,248 188,268"
          fill="none" stroke="#1e2330" stroke-width="28" stroke-linecap="round"/>
    <!-- Right hand -->
    <ellipse cx="188" cy="271" rx="12" ry="14" fill="url(#skin)"/>
    <path d="M180,266 Q188,278 196,266" fill="none" stroke="#d4b080" stroke-width="1" opacity="0.5"/>

    <!-- ── NECK ── -->
    <rect x="103" y="144" width="24" height="22" rx="9" fill="url(#skin)"/>

    <!-- ── HEAD ── -->
    <!-- Face — cleaner oval, defined jaw -->
    <path d="M73,105 Q70,68 92,52 Q105,44 115,44 Q125,44 138,52 Q160,68 157,105 Q158,128 150,138 Q138,150 115,155 Q92,150 80,138 Q72,128 73,105 Z"
          fill="url(#skin)" filter="url(#softShadow)"/>
    <!-- Jaw highlight (subtle definition) -->
    <path d="M88,140 Q115,152 142,140" fill="none" stroke="rgba(180,140,80,0.15)" stroke-width="2"/>
    <!-- Cheekbones hint -->
    <ellipse cx="82" cy="118" rx="9" ry="5" fill="rgba(220,160,100,0.08)" transform="rotate(-15,82,118)"/>
    <ellipse cx="148" cy="118" rx="9" ry="5" fill="rgba(220,160,100,0.08)" transform="rotate(15,148,118)"/>

    <!-- ── HAIR ── -->
    <!-- Main mass -->
    <path d="M70,100 Q68,62 90,50 Q103,44 115,44 Q127,44 140,50 Q162,62 160,100
             Q156,88 148,80 Q134,68 115,67 Q96,68 82,80 Q74,88 70,100 Z"
          fill="url(#hair)"/>
    <!-- Side volumes -->
    <path d="M70,100 Q65,88 68,74 Q66,85 68,98" fill="#151515"/>
    <path d="M160,100 Q165,88 162,74 Q164,85 162,98" fill="#151515"/>
    <!-- Fringe — swept slightly to one side -->
    <path d="M82,66 Q100,60 122,63 Q108,68 90,70 Z" fill="#111"/>
    <!-- Hair highlight streak -->
    <path d="M98,50 Q112,48 124,52" fill="none" stroke="rgba(80,80,80,0.35)" stroke-width="2" stroke-linecap="round"/>

    <!-- ── EARS ── -->
    <path d="M70,100 Q63,105 63,115 Q63,125 70,128" fill="none" stroke="url(#skinDark)" stroke-width="7" stroke-linecap="round"/>
    <path d="M160,100 Q167,105 167,115 Q167,125 160,128" fill="none" stroke="url(#skinDark)" stroke-width="7" stroke-linecap="round"/>

    <!-- ── EYEBROWS ── -->
    <!-- Clean, slightly arched, medium thickness -->
    <path d="M84,88 Q96,82 106,86" fill="none" stroke="#1e1e1e" stroke-width="3" stroke-linecap="round"/>
    <path d="M124,86 Q134,82 146,88" fill="none" stroke="#1e1e1e" stroke-width="3" stroke-linecap="round"/>

    <!-- ── EYES ── -->
    <!-- Left eye -->
    <path d="M85,103 Q95,96 106,103 Q95,109 85,103 Z" fill="#111"/>
    <ellipse cx="95" cy="102" rx="5" ry="5.5" fill="#1a1a1a"/>
    <ellipse cx="95" cy="102" rx="3.5" ry="3.5" fill="#2a2a2a"/>
    <!-- iris shimmer -->
    <ellipse cx="95" cy="102" rx="2" ry="2" fill="#3a4a6a" opacity="0.7"/>
    <circle cx="97" cy="100" r="1.5" fill="white" opacity="0.85"/>
    <circle cx="93" cy="104" r="0.6" fill="white" opacity="0.4"/>
    <!-- eyelid line -->
    <path d="M85,103 Q95,97 106,103" fill="none" stroke="#0d0d0d" stroke-width="1.2"/>
    <!-- lower lash line -->
    <path d="M87,105 Q95,108 104,105" fill="none" stroke="#0d0d0d" stroke-width="0.8" opacity="0.5"/>

    <!-- Right eye -->
    <path d="M124,103 Q134,96 145,103 Q134,109 124,103 Z" fill="#111"/>
    <ellipse cx="134" cy="102" rx="5" ry="5.5" fill="#1a1a1a"/>
    <ellipse cx="134" cy="102" rx="3.5" ry="3.5" fill="#2a2a2a"/>
    <ellipse cx="134" cy="102" rx="2" ry="2" fill="#3a4a6a" opacity="0.7"/>
    <circle cx="136" cy="100" r="1.5" fill="white" opacity="0.85"/>
    <circle cx="132" cy="104" r="0.6" fill="white" opacity="0.4"/>
    <path d="M124,103 Q134,97 145,103" fill="none" stroke="#0d0d0d" stroke-width="1.2"/>
    <path d="M126,105 Q134,108 143,105" fill="none" stroke="#0d0d0d" stroke-width="0.8" opacity="0.5"/>

    <!-- ── NOSE ── -->
    <!-- Slim, high bridge -->
    <path d="M112,112 Q110,122 108,126 Q111,129 115,129 Q119,129 122,126 Q120,122 118,112"
          fill="none" stroke="rgba(180,130,80,0.3)" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- nostril hints -->
    <path d="M108,127 Q106,130 109,131" fill="none" stroke="rgba(160,110,70,0.25)" stroke-width="1.2"/>
    <path d="M122,127 Q124,130 121,131" fill="none" stroke="rgba(160,110,70,0.25)" stroke-width="1.2"/>

    <!-- ── MOUTH ── -->
    <!-- Clean lips, subtle -->
    <path d="M100,138 Q108,134 115,135 Q122,134 130,138" fill="none" stroke="rgba(180,110,90,0.6)" stroke-width="1.8" stroke-linecap="round"/>
    <!-- lower lip volume hint -->
    <path d="M104,140 Q115,145 126,140" fill="none" stroke="rgba(180,110,90,0.2)" stroke-width="2" stroke-linecap="round"/>
    <!-- Cupid's bow -->
    <path d="M105,137 Q110,134 115,135 Q120,134 125,137" fill="none" stroke="rgba(180,110,90,0.3)" stroke-width="1"/>

    <!-- ── NECK SHADOW ── -->
    <path d="M103,144 Q108,148 115,148 Q122,148 127,144" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="3"/>
  </svg>
</div>

<div class="stats">
  <div class="stat"><div class="stat-label">发型</div><div class="stat-value">短发</div></div>
  <div class="stat"><div class="stat-label">气质</div><div class="stat-value">冷淡系</div></div>
  <div class="stat"><div class="stat-label">身高</div><div class="stat-value">183cm</div></div>
  <div class="stat"><div class="stat-label">眼睛</div><div class="stat-value">深邃</div></div>
  <div class="stat"><div class="stat-label">穿搭</div><div class="stat-value">深色系</div></div>
</div>

<div class="name-tag">— 坏云先生 —</div>
<div class="hint">点击有惊喜 ^^</div>

<script>
function doSparkle() {
  const wrap = document.getElementById('avatarWrap');
  const colors = ['#ffd060','#fff','#a0c4ff','#ffb3c6'];
  for (let i = 0; i < 7; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = ['✦','✧','⋆','·'][Math.floor(Math.random()*4)];
    s.style.cssText = `
      top: ${15 + Math.random() * 70}%;
      left: ${5 + Math.random() * 90}%;
      color: ${colors[Math.floor(Math.random()*colors.length)]};
      animation-delay: ${i * 0.08}s;
      font-size: ${12 + Math.random()*10}px;
    `;
    wrap.appendChild(s);
    setTimeout(() => s.remove(), 1000);
  }
}
</script>

</body>
</html>
